prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    prs:
        - key: V
          command: >-
            tmux new-window "nvim -c 'Octo pr edit {{.PrNumber}} {{.RepoName}}'"
        - key: v
          command: >-
            tmux run-shell -b
            "tmux display-popup -E -w 90% -h 90%
            \"nvim -c 'Octo pr edit {{.PrNumber}} {{.RepoName}}'\""
        - key: D
          command: >-
            tmux new-window -c "#{pane_current_path}"
            "tmux rename-window '{{.RepoName}}#{{.PrNumber}}' &&
            gh pr checkout {{.PrNumber}} &&
            nvim -c 'DiffviewOpen origin/{{.BaseRefName}}...{{.HeadRefName}}' ||
            { osascript -e 'display notification \"PR #{{.PrNumber}} {{.RepoName}} failed - check tmux window\" with title \"gh-dash D\" sound name \"Basso\"';
            tmux display-message -d 5000 'PR #{{.PrNumber}} failed';
            exec $SHELL; }"
        - key: d
          command: >-
            tmux run-shell -b
            "tmux display-popup -E -w 90% -h 90% -d '#{pane_current_path}'
            \"gh pr checkout {{.PrNumber}} &&
            nvim -c 'DiffviewOpen origin/{{.BaseRefName}}...{{.HeadRefName}}' ||
            { osascript -e 'display notification \\\"PR #{{.PrNumber}} {{.RepoName}} failed\\\" with title \\\"gh-dash d\\\" sound name \\\"Basso\\\"';
            tmux display-message -d 5000 'PR #{{.PrNumber}} failed';
            exec $SHELL; }\""
    issues:
        - key: V
          command: >-
            tmux new-window "nvim -c 'Octo issue edit {{.IssueNumber}} {{.RepoName}}'"
        - key: v
          command: >-
            tmux run-shell -b
            "tmux display-popup -E -w 90% -h 90%
            \"nvim -c 'Octo issue edit {{.IssueNumber}} {{.RepoName}}'\""
repoPaths:
    ":owner/:repo": "$HOME/codes/github.com/:owner/:repo"
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
